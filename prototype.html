<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Asterope · Energy Optimization for Yarn Twisting</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  html, body { margin: 0; padding: 0; height: 100%; width: 100%; background: #0a0a0a; overflow: hidden; }
  body { font-family: 'Geist Mono', monospace; color: #e8e6e0; }
  * { box-sizing: border-box; }
  #root { width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; }
  #scale-wrap {
    width: 1440px; height: 900px; transform-origin: center center;
    flex: 0 0 auto;
  }
</style>
</head>
<body>

<div id="root">
  <div id="scale-wrap"><div id="app"></div></div>
</div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="data.js"></script>
<script type="text/babel" src="console-app.jsx"></script>

<script type="text/babel">
  const { ConsoleApp } = window;

  function fit() {
    const wrap = document.getElementById('scale-wrap');
    if (!wrap) return;
    const sx = window.innerWidth / 1440;
    const sy = window.innerHeight / 900;
    const s = Math.min(sx, sy, 1.4);
    wrap.style.transform = `scale(${s})`;
  }
  window.addEventListener('resize', fit);
  fit();

  ReactDOM.createRoot(document.getElementById('app')).render(<ConsoleApp />);
</script>

</body>
</html>
